name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "Electivas/**"
      - "MNA/**"
      - "Derecho/**"
      - "Economia/**"
      - "Proba/**"
      - "PAW/**"
      - "SDS/**"
      - "Inge2/**"
      - "_estandar/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Permisos mínimos para publicar en Pages vía OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; cancela los en cola (no el en curso).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v5 # trae los vaults + Electivas + _estandar + site
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build # next build (output:export) → site/out
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
